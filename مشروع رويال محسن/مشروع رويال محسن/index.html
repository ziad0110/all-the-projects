<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="شركة رويال للتبغ - منتجات عالية الجودة منذ 1995" />
    <meta name="keywords" content="رويال, تبغ, سجائر, توصيل, السعودية" />
    <meta name="author" content="Royal Tobacco" />
    <meta name="theme-color" content="#0a0a0a" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <title>ROYAL TOBACCO | شركة رويال للتبغ</title>
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html {
        scroll-behavior: smooth;
      }
      
      body {
        font-family: 'Cairo', sans-serif;
        background-color: #0a0a0a;
        color: #ffffff;
        overflow-x: hidden;
      }
      
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      
      ::-webkit-scrollbar-track {
        background: #0a0a0a;
      }
      
      ::-webkit-scrollbar-thumb {
        background: #f59e0b;
        border-radius: 4px;
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background: #fbbf24;
      }
      
      /* Selection */
      ::selection {
        background: rgba(245, 158, 11, 0.3);
        color: #ffffff;
      }
      
      /* Loading Animation */
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(245, 158, 11, 0.3);
        border-top-color: #f59e0b;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      /* Leaflet Map Fixes */
      .leaflet-container {
        font-family: 'Cairo', sans-serif;
      }
      
      .leaflet-popup-content-wrapper {
        background: #1a1a1a;
        border: 1px solid rgba(245, 158, 11, 0.3);
        border-radius: 8px;
        color: #f59e0b;
      }
      
      .leaflet-popup-tip {
        background: #1a1a1a;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
