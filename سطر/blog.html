<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="مدونة سطر - أحدث المقالات والأخبار في عالم التصميم والتسويق الرقمي">
    <title>سطر | المدونة</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar scrolled">
        <div class="container">
            <a href="index.html" class="nav-logo">سطر</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link" data-i18n="nav_home">الرئيسية</a>
                <a href="index.html#about" class="nav-link" data-i18n="nav_about">من نحن</a>
                <a href="index.html#services" class="nav-link" data-i18n="nav_services">خدماتنا</a>
                <a href="index.html#portfolio" class="nav-link" data-i18n="nav_portfolio">أعمالنا</a>
                <a href="index.html#team" class="nav-link" data-i18n="nav_team">الفريق</a>
                <a href="blog.html" class="nav-link active" data-i18n="nav_blog">المدونة</a>
                <a href="index.html#contact" class="nav-link" data-i18n="nav_contact">تواصل معنا</a>
            </div>
            <div class="nav-controls">
                <button class="theme-toggle" aria-label="Toggle theme" onclick="
          const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', t);
          localStorage.setItem('satr_theme', t);
          this.innerHTML = t === 'dark' ? '☀️' : '🌙';
        ">🌙</button>
                <button class="lang-toggle" onclick="I18n.toggleLang()">EN</button>
                <div class="burger-menu"
                    onclick="this.classList.toggle('active'); document.querySelector('.mobile-nav').classList.toggle('active');">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Mobile Navigation -->
    <div class="mobile-nav">
        <a href="index.html" class="nav-link" data-i18n="nav_home">الرئيسية</a>
        <a href="index.html#about" class="nav-link" data-i18n="nav_about">من نحن</a>
        <a href="index.html#portfolio" class="nav-link" data-i18n="nav_portfolio">أعمالنا</a>
        <a href="blog.html" class="nav-link active" data-i18n="nav_blog">المدونة</a>
        <a href="index.html#contact" class="nav-link" data-i18n="nav_contact">تواصل معنا</a>
    </div>

    <!-- Blog Content -->
    <main style="padding-top:6rem;min-height:80vh;">
        <div class="container">
            <!-- List View -->
            <div id="blogListView">
                <h1 class="section-title reveal" data-i18n="blog_title" style="margin-top:2rem;">المدونة</h1>
                <p class="section-subtitle reveal" data-i18n="blog_subtitle">أحدث المقالات والأخبار من فريق سطر</p>
                <div class="blog-grid" id="blogList">
                    <!-- Rendered by JS -->
                </div>
            </div>

            <!-- Post View -->
            <div id="blogPostView" style="display:none;">
                <div id="blogContent"></div>
            </div>
        </div>
    </main>

    <!-- Footer (simplified) -->
    <footer class="footer" style="margin-top:4rem;">
        <div class="container">
            <div class="footer-bottom" style="border:none;padding:0;">
                <span data-i18n="footer_rights">© 2026 سطر. جميع الحقوق محفوظة.</span>
                <a href="index.html" class="nav-logo" style="font-size:1.2rem;">سطر</a>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/blog.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Blog.init();
            // Apply saved theme
            const theme = localStorage.getItem('satr_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            document.querySelector('.theme-toggle').innerHTML = theme === 'dark' ? '☀️' : '🌙';
        });
    </script>
</body>

</html>
