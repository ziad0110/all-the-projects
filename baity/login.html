<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>تسجيل الدخول - بيتي</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo-section">
                <h1><i class="fas fa-home"></i> بيتي</h1>
                <p>سوقك المنزلي الأول</p>
            </div>
            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchTab('login')">تسجيل الدخول</div>
                <div class="auth-tab" onclick="switchTab('register')">حساب جديد</div>
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="social-login">
                    <button type="button" class="social-btn"><i class="fab fa-google" style="color:#ea4335"></i>
                        Google</button>
                    <button type="button" class="social-btn"><i class="fab fa-apple"></i> Apple</button>
                </div>
                <div class="divider">أو</div>
                <div class="form-group"><label class="form-label">البريد الإلكتروني</label><input type="email"
                        class="form-control" placeholder="example@email.com" required></div>
                <div class="form-group"><label class="form-label">كلمة المرور</label>
                    <div style="position:relative"><input type="password" class="form-control" placeholder="••••••••"
                            required id="loginPass"><button type="button"
                            style="position:absolute;left:12px;top:50%;transform:translateY(-50%);background:none;color:var(--text-muted)"
                            onclick="togglePass('loginPass')"><i class="fas fa-eye"></i></button></div>
                </div>
                <div
                    style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;font-size:.88rem">
                    <label class="form-check"><input type="checkbox"> تذكرني</label>
                    <a href="#" style="color:var(--green-500)">نسيت كلمة المرور؟</a>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%">تسجيل الدخول</button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" style="display:none">
                <div class="form-group"><label class="form-label">الاسم الكامل</label><input type="text"
                        class="form-control" placeholder="أدخل اسمك الكامل" required></div>
                <div class="form-group"><label class="form-label">البريد الإلكتروني</label><input type="email"
                        class="form-control" placeholder="example@email.com" required></div>
                <div class="form-group"><label class="form-label">رقم الهاتف</label><input type="tel"
                        class="form-control" placeholder="777-123-456" required></div>
                <div class="form-group"><label class="form-label">كلمة المرور</label>
                    <div style="position:relative"><input type="password" class="form-control"
                            placeholder="8 أحرف على الأقل" required id="regPass"><button type="button"
                            style="position:absolute;left:12px;top:50%;transform:translateY(-50%);background:none;color:var(--text-muted)"
                            onclick="togglePass('regPass')"><i class="fas fa-eye"></i></button></div>
                </div>
                <div class="form-group"><label class="form-label">تأكيد كلمة المرور</label><input type="password"
                        class="form-control" placeholder="أعد كتابة كلمة المرور" required></div>
                <label class="form-check" style="margin-bottom:20px"><input type="checkbox" required> أوافق على <a
                        href="#" style="color:var(--green-500)">الشروط والأحكام</a></label>
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%">إنشاء حساب</button>
            </form>

            <p style="text-align:center;margin-top:20px;font-size:.88rem;color:var(--text-muted)">هل أنت بائع؟ <a
                    href="seller-register.html" style="color:var(--green-500);font-weight:600">سجل كبائع</a></p>
        </div>
    </div>
    <script>
        function switchTab(t) {
            document.querySelectorAll('.auth-tab').forEach((el, i) => { el.classList.toggle('active', t === 'login' ? i === 0 : i === 1) });
            document.getElementById('loginForm').style.display = t === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = t === 'register' ? 'block' : 'none';
        }
        function togglePass(id) { const i = document.getElementById(id); i.type = i.type === 'password' ? 'text' : 'password' }
        document.querySelectorAll('form').forEach(f => f.onsubmit = e => { e.preventDefault(); localStorage.setItem('bayti-user', 'true'); window.location.href = 'index.html' });
    </script>
</body>

</html>
