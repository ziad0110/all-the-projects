<div id="page-wallet" class="page p-4 md:p-8">
      <!-- Hero Balance Card -->
      <div class="relative overflow-hidden premium-card mb-6">
        <div class="absolute inset-0 opacity-10 pointer-events-none">
          <div class="absolute top-0 right-0 w-64 h-64 rounded-full" style="background: radial-gradient(circle, rgba(99,102,241,0.4) 0%, transparent 70%); transform: translate(30%, -30%);">
          </div>
          <div class="absolute bottom-0 left-0 w-48 h-48 rounded-full" style="background: radial-gradient(circle, rgba(16,185,129,0.3) 0%, transparent 70%); transform: translate(-20%, 20%);">
          </div>
        </div>
        <div class="relative p-6 pb-5">
          <!-- Trust Badge -->
          <div class="flex items-center justify-between mb-5">
            <div class="flex items-center gap-2">
              <div class="w-8 h-8 rounded-lg glass flex items-center justify-center">
                <i class="fas fa-shield-alt text-emerald-500 text-sm"></i>
              </div>
              <div>
                <p class="text-[10px] text-emerald-500 font-semibold tracking-wide">محفظة محمية</p>
                <p class="text-[9px] text-gray-400">تشفير 256-bit</p>
              </div>
            </div>
            <div class="flex gap-2">
              <button class="px-3 py-1.5 rounded-lg glass text-[10px] text-amber-400 border-amber-500/30 hover:bg-amber-500/10 transition flex items-center gap-1.5" onclick="rechargeDemoBalance()">
                <i class="fas fa-magic text-[8px]"></i>
                شحن تجريبي
              </button>
              <button class="px-3 py-1.5 rounded-lg glass text-[10px] hover:bg-black/5 dark:hover:bg-white/5 transition flex items-center gap-1.5" onclick="showLinkBankModal()">
                <i class="fas fa-link text-[8px]"></i>
                ربط بنك
              </button>
              <button class="px-3 py-1.5 rounded-lg glass text-[10px] hover:bg-black/5 dark:hover:bg-white/5 transition flex items-center gap-1.5" onclick="showAddCardModal()">
                <i class="fas fa-plus text-[8px]"></i>
                إضافة بطاقة
              </button>
            </div>
          </div>

          <!-- Balance Display -->
          <div class="text-center mb-6">
            <p class="text-xs text-gray-500 mb-2 tracking-wide">الرصيد المتاح</p>
            <h2 class="text-4xl md:text-5xl font-black tracking-tight mb-1" id="wallet-balance" style="font-feature-settings: 'tnum'; letter-spacing: -0.02em;">
              24,850.00 ر.س
            </h2>
            <div class="flex items-center justify-center gap-1.5 mt-2">
              <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
              <span class="text-[10px] text-gray-500">الحساب نشط</span>
            </div>
          </div>

          <!-- Action Buttons -->
          <div class="grid grid-cols-2 gap-3">
            <button class="group relative py-4 rounded-2xl overflow-hidden transition-all active:scale-[0.97]" onclick="showDepositModal()" style="background: linear-gradient(135deg, rgba(16,185,129,0.15) 0%, rgba(6,182,212,0.15) 100%); border: 1px solid rgba(16,185,129,0.2);">
              <div class="absolute inset-0 bg-gradient-to-r from-emerald-500/0 via-emerald-500/10 to-emerald-500/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700">
              </div>
              <div class="relative flex flex-col items-center gap-1.5">
                <div class="w-9 h-9 rounded-xl bg-emerald-500/20 flex items-center justify-center">
                  <i class="fas fa-arrow-down text-emerald-400 text-sm"></i>
                </div>
                <span class="text-sm font-semibold text-emerald-300">إيداع</span>
              </div>
            </button>
            <button class="group relative py-4 rounded-2xl overflow-hidden transition-all active:scale-[0.97]" onclick="showWithdrawModal()" style="background: linear-gradient(135deg, rgba(244,63,94,0.12) 0%, rgba(251,113,133,0.12) 100%); border: 1px solid rgba(244,63,94,0.2);">
              <div class="absolute inset-0 bg-gradient-to-r from-rose-500/0 via-rose-500/10 to-rose-500/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700">
              </div>
              <div class="relative flex flex-col items-center gap-1.5">
                <div class="w-9 h-9 rounded-xl bg-rose-500/20 flex items-center justify-center">
                  <i class="fas fa-arrow-up text-rose-400 text-sm"></i>
                </div>
                <span class="text-sm font-semibold text-rose-300">سحب</span>
              </div>
            </button>
          </div>
        </div>
      </div>

      <!-- Quick Stats Row -->
      <div class="grid grid-cols-3 gap-3 mb-6">
        <div class="glass-card tint-emerald rounded-2xl p-3 text-center">
          <div class="w-8 h-8 rounded-lg bg-emerald-500/10 flex items-center justify-center mx-auto mb-1.5">
            <i class="fas fa-arrow-down text-emerald-400 text-xs"></i>
          </div>
          <p class="text-xs font-bold text-emerald-400" id="wallet-stat-income">+15,200</p>
          <p class="text-[9px] text-gray-500">الداخل</p>
        </div>
        <div class="glass-card tint-rose rounded-2xl p-3 text-center">
          <div class="w-8 h-8 rounded-lg bg-rose-500/10 flex items-center justify-center mx-auto mb-1.5">
            <i class="fas fa-arrow-up text-rose-400 text-xs"></i>
          </div>
          <p class="text-xs font-bold text-rose-400" id="wallet-stat-expense">-8,340</p>
          <p class="text-[9px] text-gray-500">الخارج</p>
        </div>
        <div class="glass-card tint-indigo rounded-2xl p-3 text-center">
          <div class="w-8 h-8 rounded-lg bg-indigo-500/10 flex items-center justify-center mx-auto mb-1.5">
            <i class="fas fa-exchange-alt text-indigo-400 text-xs"></i>
          </div>
          <p class="text-xs font-bold text-indigo-400" id="wallet-stat-transfers">12</p>
          <p class="text-[9px] text-gray-500">عملية</p>
        </div>
      </div>

      <!-- Transaction History Header -->
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-2">
          <div class="w-1 h-5 rounded-full bg-gradient-to-b from-indigo-500 to-purple-500"></div>
          <h3 class="font-bold text-sm">سجل العمليات</h3>
        </div>
        <span class="text-[10px] text-gray-500" id="wallet-tx-count">آخر 30 يوم</span>
      </div>

      <!-- Search & Filter -->
      <div class="flex gap-3 mb-4">
        <div class="flex-1 relative">
          <i class="fas fa-search absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 text-xs"></i>
          <input type="text" class="premium-input pr-12 text-sm" placeholder="ابحث في العمليات..." id="transaction-search" oninput="filterTransactions()">
        </div>
      </div>

      <!-- Filter Tags -->
      <div class="flex gap-2 mb-5 overflow-x-auto hide-scroll" id="filter-tags">
        <button class="px-4 py-2 rounded-full text-xs whitespace-nowrap font-medium transition-all" style="background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(139,92,246,0.2)); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.2);" onclick="setFilter(this, 'all')">
          <i class="fas fa-layer-group ml-1 text-[9px]"></i> الكل
        </button>
        <button class="px-4 py-2 rounded-full glass text-xs whitespace-nowrap text-gray-400 hover:text-emerald-400 transition" onclick="setFilter(this, 'income')">
          <i class="fas fa-arrow-down ml-1 text-[9px]"></i> الدخل
        </button>
        <button class="px-4 py-2 rounded-full glass text-xs whitespace-nowrap text-gray-400 hover:text-rose-400 transition" onclick="setFilter(this, 'expense')">
          <i class="fas fa-arrow-up ml-1 text-[9px]"></i> المصروفات
        </button>
        <button class="px-4 py-2 rounded-full glass text-xs whitespace-nowrap text-gray-400 hover:text-blue-400 transition" onclick="setFilter(this, 'transfer')">
          <i class="fas fa-exchange-alt ml-1 text-[9px]"></i> التحويلات
        </button>
      </div>

      <!-- Transactions List -->
      <div id="wallet-transactions" class="space-y-3">
        <!-- Injected via JS -->
      </div>
    </div>
