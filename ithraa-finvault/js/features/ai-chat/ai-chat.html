<div id="page-ai-chat" class="page p-4 md:p-8 h-[calc(100vh-80px)] flex flex-col">
      <div class="glass-card rounded-2xl flex-1 flex flex-col overflow-hidden">
        <div class="p-4 border-b border-white/5 flex items-center gap-3">
          <div class="w-10 h-10 rounded-full bg-gradient-to-br from-ethereal-violet to-ethereal-cyan flex items-center justify-center animate-pulse">
            <i class="fas fa-robot text-white"></i>
          </div>
          <div>
            <h3 class="font-bold">المستشار المالي الذكي</h3>
            <p class="text-xs text-emerald flex items-center gap-1">
              <span class="w-2 h-2 rounded-full bg-emerald-400"></span>
              متصل الآن
            </p>
          </div>
        </div>

        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4">
          <div class="flex gap-3">
            <div class="w-8 h-8 rounded-full bg-gradient-to-br from-ethereal-violet to-ethereal-cyan flex items-center justify-center flex-shrink-0">
              <i class="fas fa-robot text-white text-xs"></i>
            </div>
            <div class="chat-bubble-ai p-4 max-w-[80%]">
              <p class="text-sm">
                مرحباً أحمد! أنا مستشارك المالي الذكي. كيف يمكنني مساعدتك
                اليوم؟ يمكنني تحليل إنفاقك واقتراح نصائح للتوفير.
              </p>
            </div>
          </div>
        </div>

        <div class="p-4 border-t border-white/5">
          <div class="flex gap-3">
            <input type="text" class="premium-input flex-1" placeholder="اكتب رسالتك هنا..." id="chat-input" onkeypress="if (event.key === 'Enter') sendMessage();">
            <button class="w-12 h-12 rounded-xl bg-gradient-to-br from-ethereal-violet to-ethereal-cyan flex items-center justify-center flex-shrink-0" onclick="sendMessage()">
              <i class="fas fa-paper-plane text-white"></i>
            </button>
          </div>
          <div class="flex gap-2 mt-3 overflow-x-auto hide-scroll">
            <button class="px-3 py-1.5 rounded-full glass text-xs whitespace-nowrap" onclick="quickAsk('كيف يمكنني توفير المزيد؟')">
              كيف أوفّر أكثر؟
            </button>
            <button class="px-3 py-1.5 rounded-full glass text-xs whitespace-nowrap" onclick="quickAsk('حلل إنفاقي الشهري')">
              حلل إنفاقي
            </button>
            <button class="px-3 py-1.5 rounded-full glass text-xs whitespace-nowrap" onclick="quickAsk('نصائح للاستثمار')">
              نصائح استثمار
            </button>
          </div>
        </div>
      </div>
    </div>
