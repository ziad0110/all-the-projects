<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تسجيل الدخول</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
</head>
<body class="login-wrap d-flex align-items-center justify-content-center">
  <div class="card p-5" style="max-width:480px;width:100%">
    <div class="text-center mb-4">
      <div class="stat-icon bg-primary-subtle text-primary mx-auto mb-3" style="width:64px;height:64px;font-size:1.6rem">
        <i class="bi bi-shield-lock"></i>
      </div>
      <h3 class="mb-1" style="font-weight:800">Smart Accounting Suite</h3>
      <p class="text-muted mb-0">سجّل الدخول لبدء العمل</p>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="post">
      <div class="mb-3">
        <label class="form-label">اسم المستخدم</label>
        <input class="form-control" name="username" placeholder="أدخل اسم المستخدم" required>
      </div>
      <div class="mb-4">
        <label class="form-label">كلمة المرور</label>
        <input class="form-control" type="password" name="password" placeholder="********" required>
      </div>
      <button class="btn btn-primary w-100 py-3" style="font-size:1rem"><i class="bi bi-box-arrow-in-left me-2"></i>دخول</button>
    </form>
  </div>
</body>
</html>
