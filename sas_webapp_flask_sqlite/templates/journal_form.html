{% extends "base.html" %}
{% block content %}
<div class="container-fluid py-4">
    <div class="row justify-content-center">
        <div class="col-xl-11">
            <!-- Page Header -->
            <div class="d-flex justify-content-between align-items-center mb-4 animate__animated animate__fadeIn">
                <div>
                    <h2 class="fw-bold text-primary mb-1">
                        <i class="bi bi-journal-text me-2"></i>قيد يومية يدوي
                    </h2>
                    <p class="text-muted small">تسجيل القيود المحاسبية المباشرة والتسويات المالية</p>
                </div>
                <div class="d-flex gap-2">
                    <a href="{{ url_for('journals_list') }}" class="btn btn-outline-secondary rounded-3 px-4 shadow-sm">
                        <i class="bi bi-list-columns-reverse me-2"></i>سجل القيود
                    </a>
                </div>
            </div>

            <!-- Form Card -->
            <form method="post" id="journalForm" class="animate__animated animate__fadeInUp">
                <div class="card border-0 shadow-lg mb-4" style="border-radius: 20px; overflow: hidden;">
                    <div class="card-header bg-primary text-white py-3 px-4 border-0 d-flex justify-content-between align-items-center">
                        <h5 class="mb-0 fw-bold"><i class="bi bi-info-circle me-2"></i>بيانات القيد الأساسية</h5>
                        <div class="badge bg-white-transparent rounded-pill px-3 py-2" id="statusBadge">القيد غير متوازن</div>
                    </div>
                    <div class="card-body p-4 p-md-5">
                        <div class="row g-4 mb-4">
                            <div class="col-md-3">
                                <label class="form-label fw-bold text-muted small">تاريخ القيد</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-0"><i class="bi bi-calendar-event"></i></span>
                                    <input type="date" name="entry_date" class="form-control border-0 bg-light" required value="{{ today }}">
                                </div>
                            </div>
                            <div class="col-md-9">
                                <label class="form-label fw-bold text-muted small">البيان العام للقيد (الوصف)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-0"><i class="bi bi-chat-left-text"></i></span>
                                    <input type="text" name="description" class="form-control border-0 bg-light" required placeholder="مثلاً: قيد إثبات رواتب شهر مايو 2024">
                                </div>
                            </div>
                        </div>

                        <!-- Journal Lines Section -->
                        <div class="section-title mb-4 d-flex justify-content-between align-items-center">
                            <span class="badge bg-soft-primary text-primary px-3 py-2 rounded-pill">تفاصيل الحركات (أسطر القيد)</span>
                            <button type="button" class="btn btn-soft-primary btn-sm rounded-pill px-3" onclick="addLine()">
                                <i class="bi bi-plus-lg me-1"></i>إضافة سطر جديد
                            </button>
                        </div>

                        <div class="table-responsive">
                            <table class="table align-middle border-bottom custom-journal-table">
                                <thead class="bg-light">
                                    <tr>
                                        <th style="width: 35%;">الحساب المالي</th>
                                        <th style="width: 15%;" class="text-center">مدين (+)</th>
                                        <th style="width: 15%;" class="text-center">دائن (-)</th>
                                        <th style="width: 30%;">بيان السطر</th>
                                        <th style="width: 5%;"></th>
                                    </tr>
                                </thead>
                                <tbody id="lines">
                                    <!-- Dynamic Lines Go Here -->
                                </tbody>
                                <tfoot class="bg-light fw-bold">
                                    <tr>
                                        <td class="ps-4">الإجمالي الكلي</td>
                                        <td class="text-center">
                                            <div id="totalDebit" class="text-success h5 mb-0 fw-bold">0.00</div>
                                        </td>
                                        <td class="text-center">
                                            <div id="totalCredit" class="text-danger h5 mb-0 fw-bold">0.00</div>
                                        </td>
                                        <td colspan="2" class="text-center">
                                            <div id="diffContainer" class="badge rounded-pill px-4 py-2 bg-soft-danger text-danger">
                                                الفارق: <span id="balanceDiff">0.00</span>
                                            </div>
                                        </td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>

                        <!-- Action Buttons -->
                        <div class="d-flex justify-content-end gap-3 mt-5 pt-4 border-top">
                            <button type="reset" class="btn btn-light rounded-3 px-4 shadow-sm fw-bold">إعادة تعيين</button>
                            <button type="submit" id="submitBtn" class="btn btn-primary rounded-3 px-5 shadow-sm fw-bold transition-all hover-lift" disabled>
                                <i class="bi bi-check-double me-2"></i>ترحيل وحفظ القيد
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    :root {
        --primary-soft: rgba(37, 99, 235, 0.1);
        --success-soft: rgba(22, 163, 74, 0.1);
        --danger-soft: rgba(220, 38, 38, 0.1);
    }
    .bg-soft-primary { background-color: var(--primary-soft); }
    .bg-soft-success { background-color: var(--success-soft); }
    .bg-soft-danger { background-color: var(--danger-soft); }
    .bg-white-transparent { background-color: rgba(255, 255, 255, 0.2) !important; }

    .btn-soft-primary {
        background-color: var(--primary-soft);
        color: var(--bs-primary);
        border: none;
    }
    .btn-soft-primary:hover {
        background-color: var(--bs-primary);
        color: white;
    }

    .hover-lift:hover { transform: translateY(-3px); }
    .transition-all { transition: all 0.3s ease; }

    .custom-journal-table thead th {
        padding: 1rem;
        font-weight: 700;
        color: #64748b;
        font-size: 0.85rem;
        border: none;
    }

    .line-row td {
        padding: 0.75rem;
        border: none;
    }

    .form-control:focus, .form-select:focus {
        background-color: #fff !important;
        box-shadow: 0 0 0 0.25rem var(--primary-soft);
        border: 1px solid var(--bs-primary) !important;
    }

    [data-theme='dark'] .card { background-color: #1e293b; color: #fff; }
    [data-theme='dark'] .bg-light, [data-theme='dark'] .custom-journal-table thead { background-color: #0f172a !important; color: #cbd5e1; }
    [data-theme='dark'] .form-control, [data-theme='dark'] .form-select { background-color: rgba(255,255,255,0.05) !important; color: white; border-color: #334155 !important; }
</style>

<script id="data-accounts" type="application/json">{{ accounts|tojson }}</script>
<script>
const accounts = JSON.parse(document.getElementById('data-accounts').textContent);

function addLine(){
    const container = document.getElementById('lines');
    const row = document.createElement('tr');
    row.className = 'line-row animate__animated animate__fadeIn';
    
    let options = accounts.map(a => `<option value="${a.account_id}">${a.label}</option>`).join('');
    
    row.innerHTML = `
        <td>
            <select name="account_id[]" class="form-select border-0 bg-light select2" required>
                <option value="">-- اختر الحساب --</option>
                ${options}
            </select>
        </td>
        <td>
            <input type="number" name="debit[]" step="0.01" class="form-control border-0 bg-light text-center fw-bold text-success debit-input" placeholder="0.00" oninput="calcTotals()">
        </td>
        <td>
            <input type="number" name="credit[]" step="0.01" class="form-control border-0 bg-light text-center fw-bold text-danger credit-input" placeholder="0.00" oninput="calcTotals()">
        </td>
        <td>
            <input type="text" name="line_desc[]" class="form-control border-0 bg-light" placeholder="بيان السطر...">
        </td>
        <td class="text-center">
            <button type="button" class="btn btn-outline-danger btn-sm rounded-circle border-0" onclick="this.closest('tr').remove();calcTotals()">
                <i class="bi bi-trash-fill"></i>
            </button>
        </td>
    `;
    container.appendChild(row);
    // Initialize select2 for new element if available
    if(typeof $('.select2').select2 === 'function') {
        $(row).find('.select2').select2({ width: '100%' });
    }
}

function calcTotals(){
    let totalDebit = 0;
    let totalCredit = 0;
    
    document.querySelectorAll('.debit-input').forEach(i => totalDebit += parseFloat(i.value || 0));
    document.querySelectorAll('.credit-input').forEach(i => totalCredit += parseFloat(i.value || 0));
    
    document.getElementById('totalDebit').textContent = totalDebit.toFixed(2);
    document.getElementById('totalCredit').textContent = totalCredit.toFixed(2);
    
    const diff = Math.abs(totalDebit - totalCredit);
    const diffContainer = document.getElementById('diffContainer');
    const balanceDiff = document.getElementById('balanceDiff');
    const submitBtn = document.getElementById('submitBtn');
    const statusBadge = document.getElementById('statusBadge');
    
    balanceDiff.textContent = diff.toFixed(2);
    
    if (diff < 0.01 && (totalDebit > 0 || totalCredit > 0)) {
        diffContainer.className = 'badge rounded-pill px-4 py-2 bg-soft-success text-success';
        diffContainer.innerHTML = '<i class="bi bi-check-circle-fill me-1"></i>القيد متوازن';
        submitBtn.disabled = false;
        statusBadge.textContent = 'القيد متوازن وجاهز للترحيل';
        statusBadge.className = 'badge bg-success rounded-pill px-3 py-2';
    } else {
        diffContainer.className = 'badge rounded-pill px-4 py-2 bg-soft-danger text-danger';
        diffContainer.innerHTML = `<i class="bi bi-exclamation-triangle-fill me-1"></i>الفارق: <span id="balanceDiff">${diff.toFixed(2)}</span>`;
        submitBtn.disabled = true;
        statusBadge.textContent = 'القيد غير متوازن';
        statusBadge.className = 'badge bg-danger rounded-pill px-3 py-2';
    }
}

// Initial 2 lines
addLine();
addLine();
</script>
{% endblock %}
