{% extends 'base.html' %}
{% block content %}
<div class="container-fluid py-4">
    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold text-primary mb-1"><i class="bi bi-arrow-left-right me-2"></i>تحويل مخزني جديد</h2>
            <p class="text-muted">نقل كميات من الأصناف بين المستودعات بشكل رسمي</p>
        </div>
        <a href="{{ url_for('transfers_list') }}" class="btn btn-outline-secondary rounded-pill px-4">
            <i class="bi bi-arrow-right me-2"></i>العودة للقائمة
        </a>
    </div>

    <form method="post" id="transferForm">
        <div class="row g-4">
            <!-- Main Config Card -->
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm sticky-top" style="border-radius: 20px; top: 20px;">
                    <div class="card-header bg-transparent border-0 py-3">
                        <h5 class="mb-0 fw-bold"><i class="bi bi-gear me-2 text-primary"></i>إعدادات النقل</h5>
                    </div>
                    <div class="card-body p-4">
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-muted">تاريخ التحويل</label>
                            <input type="date" name="transfer_date" class="form-control border-0" required id="transfer_date">
                        </div>
                        
                        <div class="mb-4">
                            <div class="p-3 rounded-3 bg-danger bg-opacity-10 border border-danger border-opacity-25 mb-3">
                                <label class="form-label fw-bold small text-danger"><i class="bi bi-box-arrow-right me-1"></i>من مستودع (المصدر)</label>
                                <select name="from_warehouse_id" class="form-select border-0 shadow-none" required>
                                    {% for w in warehouses %}<option value="{{ w.warehouse_id }}">{{ w.name_ar }}</option>{% endfor %}
                                </select>
                            </div>
                            
                            <div class="text-center my-2">
                                <i class="bi bi-arrow-down-up text-muted fs-4"></i>
                            </div>

                            <div class="p-3 rounded-3 bg-success bg-opacity-10 border border-success border-opacity-25">
                                <label class="form-label fw-bold small text-success"><i class="bi bi-box-arrow-in-left me-1"></i>إلى مستودع (الوجهة)</label>
                                <select name="to_warehouse_id" class="form-select border-0 shadow-none" required>
                                    {% for w in warehouses %}<option value="{{ w.warehouse_id }}" {{ 'selected' if loop.index == 2 }}>{{ w.name_ar }}</option>{% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold small text-muted">ملاحظات إضافية</label>
                            <textarea name="notes" class="form-control border-0" rows="3" placeholder="اكتب تفاصيل النقل هنا..."></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill shadow-sm py-3 fw-bold">
                            <i class="bi bi-check2-circle me-2"></i>تأفيذ عملية التحويل
                        </button>
                    </div>
                </div>
            </div>

            <!-- Items Card -->
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm" style="border-radius: 20px;">
                    <div class="card-header bg-transparent border-0 py-3 d-flex justify-content-between align-items-center">
                        <h5 class="mb-0 fw-bold"><i class="bi bi-list-check me-2 text-primary"></i>الأصناف المراد نقلها</h5>
                        <button type="button" class="btn btn-outline-primary btn-sm rounded-pill px-3" onclick="addLine()">
                            <i class="bi bi-plus-lg me-1"></i>إضافة صنف
                        </button>
                    </div>
                    <div class="card-body p-4">
                        <div id="linesContainer">
                            <!-- Dynamic rows will appear here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

<!-- Line Template -->
<template id="line-template">
    <div class="line-row p-3 mb-3 border rounded-4 shadow-sm animate-fade-in" style="border-style: dashed !important;">
        <div class="row g-3 align-items-end">
            <div class="col-md-7">
                <label class="form-label fw-bold small text-muted">الصنف</label>
                <select name="item_id[]" class="form-select select2-dynamic" required>
                    <option value="">-- ابحث عن الصنف --</option>
                    {% for item in items %}
                    <option value="{{ item.item_id }}">{{ item.item_code }} - {{ item.name_ar }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold small text-muted">الكمية المحولة</label>
                <div class="input-group">
                    <input type="number" name="quantity[]" step="0.01" class="form-control border-0" placeholder="0.00" required min="0.01">
                    <span class="input-group-text border-0">وحدة</span>
                </div>
            </div>
            <div class="col-md-1 text-end">
                <button type="button" class="btn btn-link text-danger p-0" onclick="this.closest('.line-row').remove()">
                    <i class="bi bi-trash fs-5"></i>
                </button>
            </div>
        </div>
    </div>
</template>

<style>
    .animate-fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    [data-theme='dark'] .line-row { background-color: rgba(255,255,255,0.05); }
    [data-theme='dark'] .form-control, [data-theme='dark'] .form-select, [data-theme='dark'] .input-group-text { background-color: rgba(255,255,255,0.05) !important; color: white; }
</style>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
    // Set current date
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('transfer_date').value = today;
    
    // Add initial line
    addLine();
});

function addLine() {
    const template = document.getElementById('line-template').content.cloneNode(true);
    const container = document.getElementById('linesContainer');
    container.appendChild(template);
    
    // Initialize select2 for the new row if available
    const lastRow = container.lastElementChild;
    if (typeof jQuery !== 'undefined' && typeof jQuery.fn.select2 !== 'undefined') {
        $(lastRow).find('.select2-dynamic').select2({ dir: "rtl", width: '100%' });
    }
}

document.getElementById('transferForm').onsubmit = function(e) {
    if (document.querySelectorAll('.line-row').length === 0) {
        e.preventDefault();
        Swal.fire({ icon: 'warning', title: 'تنبيه', text: 'يرجى إضافة صنف واحد على الأقل للتحويل' });
        return;
    }
};
</script>
{% endblock %}
