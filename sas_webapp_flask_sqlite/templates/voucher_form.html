{% extends 'base.html' %}
{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-10 col-xl-9">
            <!-- Header Section -->
            <div class="d-flex justify-content-between align-items-center mb-4 animate__animated animate__fadeIn">
                <div class="d-flex align-items-center">
                    <div id="voucherIconContainer" class="icon-shape bg-soft-success rounded-4 p-3 me-3 transition-all shadow-sm">
                        <i id="voucherIcon" class="bi bi-cash-coin fs-2 text-success"></i>
                    </div>
                    <div>
                        <h2 class="fw-bold mb-1" id="voucherTitle">إصدار سند مالي</h2>
                        <p class="text-muted small mb-0">توثيق عمليات القبض والصرف في السجلات المالية</p>
                    </div>
                </div>
                <a href="{{ url_for('vouchers_list') }}" class="btn btn-outline-secondary rounded-pill px-4 transition-all hover-lift shadow-sm">
                    <i class="bi bi-list-ul me-2"></i>سجل السندات
                </a>
            </div>

            <!-- Main Form Card -->
            <form method="post" class="animate__animated animate__fadeInUp">
                <div class="card border-0 shadow-lg" style="border-radius: 24px; overflow: hidden;">
                    <div id="voucherCardHeader" class="card-header bg-success text-white py-3 px-4 border-0 transition-all">
                        <div class="d-flex justify-content-between align-items-center">
                            <h5 class="mb-0 fw-bold"><i class="bi bi-pencil-square me-2"></i>بيانات السند الجديد</h5>
                            <span class="badge bg-white-transparent rounded-pill px-3 py-2" id="typeBadge">سند قبض</span>
                        </div>
                    </div>
                    
                    <div class="card-body p-4 p-md-5">
                        <!-- Type Selector (Radio Buttons as Cards) -->
                        <div class="row g-3 mb-5">
                            <div class="col-md-6">
                                <input type="radio" class="btn-check" name="voucher_type" id="typeReceipt" value="RECEIPT" checked onchange="updateUI('RECEIPT')">
                                <label class="btn btn-outline-success w-100 py-3 rounded-4 fw-bold transition-all border-2 d-flex align-items-center justify-content-center gap-2" for="typeReceipt">
                                    <i class="bi bi-arrow-down-left-circle-fill"></i>
                                    <span>سند قبض (استلام)</span>
                                </label>
                            </div>
                            <div class="col-md-6">
                                <input type="radio" class="btn-check" name="voucher_type" id="typePayment" value="PAYMENT" onchange="updateUI('PAYMENT')">
                                <label class="btn btn-outline-warning w-100 py-3 rounded-4 fw-bold transition-all border-2 d-flex align-items-center justify-content-center gap-2" for="typePayment">
                                    <i class="bi bi-arrow-up-right-circle-fill"></i>
                                    <span>سند صرف (دفع)</span>
                                </label>
                            </div>
                        </div>

                        <div class="row g-4">
                            <!-- Basic Info Section -->
                            <div class="col-12">
                                <div class="section-title mb-3">
                                    <span class="badge bg-soft-primary text-primary px-3 py-2 rounded-pill">1. البيانات الأساسية والمالية</span>
                                </div>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-muted small">تاريخ السند</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-0"><i class="bi bi-calendar-check"></i></span>
                                    <input class="form-control border-0 bg-light" type="date" name="payment_date" required id="vDate">
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold text-muted small">المبلغ الكلي</label>
                                <div class="input-group input-group-lg">
                                    <span id="amountIcon" class="input-group-text bg-soft-success border-0 text-success"><i class="bi bi-currency-dollar"></i></span>
                                    <input class="form-control border-0 bg-light fw-bold text-success" type="number" step="0.01" name="amount" required min="0.01" placeholder="0.00" id="vAmount">
                                    <span class="input-group-text bg-light border-0 fw-bold smaller">ر.ي</span>
                                </div>
                            </div>

                            <!-- Dynamic Party Section -->
                            <div class="col-md-6" id="customerGroup">
                                <label class="form-label fw-bold text-muted small">العميل (المقبوض منه)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-0"><i class="bi bi-person"></i></span>
                                    <select class="form-select border-0 bg-light select2" name="customer_id" id="customerSelect">
                                        <option value="">-- اختر العميل --</option>
                                        {% for c in customers %}<option value="{{ c.customer_id }}">{{ c.name_ar }}</option>{% endfor %}
                                    </select>
                                </div>
                            </div>

                            <div class="col-md-6" id="supplierGroup" style="display:none">
                                <label class="form-label fw-bold text-muted small">المورد (المدفوع له)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-0"><i class="bi bi-truck"></i></span>
                                    <select class="form-select border-0 bg-light select2" name="supplier_id" id="supplierSelect">
                                        <option value="">-- اختر المورد --</option>
                                        {% for s in suppliers %}<option value="{{ s.supplier_id }}">{{ s.name_ar }}</option>{% endfor %}
                                    </select>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold text-muted small">طريقة الدفع / القبض</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-0"><i class="bi bi-wallet2"></i></span>
                                    <select class="form-select border-0 bg-light" name="payment_method">
                                        <option value="CASH">نقداً (Cash)</option>
                                        <option value="CARD">بطاقة إلكترونية (Card)</option>
                                        <option value="BANK">تحويل بنكي (Bank)</option>
                                    </select>
                                </div>
                            </div>

                            <!-- Description Section -->
                            <div class="col-12">
                                <label class="form-label fw-bold text-muted small">البيان / تفاصيل العملية</label>
                                <textarea class="form-control border-0 bg-light" name="description" rows="3" placeholder="اكتب بياناً مفصلاً للسند هنا..."></textarea>
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="d-flex justify-content-end gap-3 mt-5 pt-4 border-top">
                            <button type="reset" class="btn btn-light rounded-3 px-4 shadow-sm fw-bold">إلغاء</button>
                            <button type="submit" id="submitBtn" class="btn btn-success rounded-3 px-5 shadow-sm fw-bold transition-all hover-lift">
                                <i class="bi bi-check-circle-fill me-2"></i>حفظ السند
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    :root {
        --primary-soft: rgba(37, 99, 235, 0.1);
        --success-soft: rgba(22, 163, 74, 0.1);
        --warning-soft: rgba(245, 158, 11, 0.1);
    }
    .bg-soft-primary { background-color: var(--primary-soft); }
    .bg-soft-success { background-color: var(--success-soft); }
    .bg-soft-warning { background-color: var(--warning-soft); }
    .bg-white-transparent { background-color: rgba(255, 255, 255, 0.2) !important; }

    .hover-lift:hover { transform: translateY(-3px); }
    .transition-all { transition: all 0.3s ease; }

    .form-control:focus, .form-select:focus {
        background-color: #fff !important;
        box-shadow: 0 0 0 0.25rem var(--primary-soft);
        border: none;
    }

    [data-theme='dark'] .card { background-color: #1e293b; color: #fff; }
    [data-theme='dark'] .bg-light { background-color: #0f172a !important; color: #cbd5e1; }
    [data-theme='dark'] .form-control, [data-theme='dark'] .form-select { color: #fff; }
</style>

<script>
document.getElementById('vDate').valueAsDate = new Date();

function updateUI(type) {
    const iconContainer = document.getElementById('voucherIconContainer');
    const icon = document.getElementById('voucherIcon');
    const header = document.getElementById('voucherCardHeader');
    const title = document.getElementById('voucherTitle');
    const badge = document.getElementById('typeBadge');
    const submitBtn = document.getElementById('submitBtn');
    const cGroup = document.getElementById('customerGroup');
    const sGroup = document.getElementById('supplierGroup');
    const amountField = document.getElementById('vAmount');
    const amountIcon = document.getElementById('amountIcon');

    if (type === 'RECEIPT') {
        iconContainer.className = 'icon-shape bg-soft-success rounded-4 p-3 me-3 transition-all shadow-sm';
        icon.className = 'bi bi-cash-coin fs-2 text-success';
        header.className = 'card-header bg-success text-white py-3 px-4 border-0 transition-all';
        title.innerText = 'إصدار سند قبض نقدية';
        badge.innerText = 'سند قبض';
        badge.className = 'badge bg-white-transparent rounded-pill px-3 py-2';
        submitBtn.className = 'btn btn-success rounded-3 px-5 shadow-sm fw-bold transition-all hover-lift';
        amountField.classList.remove('text-warning');
        amountField.classList.add('text-success');
        amountIcon.className = 'input-group-text bg-soft-success border-0 text-success';
        cGroup.style.display = '';
        sGroup.style.display = 'none';
    } else {
        iconContainer.className = 'icon-shape bg-soft-warning rounded-4 p-3 me-3 transition-all shadow-sm';
        icon.className = 'bi bi-cash-stack fs-2 text-warning';
        header.className = 'card-header bg-warning text-white py-3 px-4 border-0 transition-all';
        title.innerText = 'إصدار سند صرف نقدية';
        badge.innerText = 'سند صرف';
        badge.className = 'badge bg-white-transparent rounded-pill px-3 py-2';
        submitBtn.className = 'btn btn-warning rounded-3 px-5 shadow-sm fw-bold text-white transition-all hover-lift';
        amountField.classList.remove('text-success');
        amountField.classList.add('text-warning');
        amountIcon.className = 'input-group-text bg-soft-warning border-0 text-warning';
        cGroup.style.display = 'none';
        sGroup.style.display = '';
    }
}
</script>
{% endblock %}
