{% extends "base.html" %}
{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4 animate__animated animate__fadeIn">
                <div>
                    <h2 class="fw-bold text-primary mb-1">
                        <i class="bi bi-bank2 me-2"></i>إدارة الشيكات
                    </h2>
                    <p class="text-muted small">تسجيل ومتابعة الشيكات الصادرة والواردة</p>
                </div>
                <a href="{{ url_for('checks_list') }}" class="btn btn-outline-secondary rounded-3 shadow-sm px-4">
                    <i class="bi bi-list-ul me-2"></i>عرض كافة الشيكات
                </a>
            </div>

            <!-- Form Card -->
            <div class="card border-0 shadow-lg animate__animated animate__fadeInUp" style="border-radius: 20px; overflow: hidden;">
                <div class="card-header bg-primary text-white py-3 px-4 border-0">
                    <h5 class="mb-0 fw-bold"><i class="bi bi-plus-circle me-2"></i>بيانات الشيك الجديد</h5>
                </div>
                <div class="card-body p-4 p-md-5">
                    <form method="post">
                        <!-- Primary Info Section -->
                        <div class="row g-4 mb-5">
                            <div class="col-12">
                                <div class="section-title mb-3">
                                    <span class="badge bg-soft-primary text-primary px-3 py-2 rounded-pill">1. البيانات الأساسية</span>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold text-muted small">رقم الشيك</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-0"><i class="bi bi-hash"></i></span>
                                    <input type="text" name="check_number" class="form-control border-0 bg-light" required placeholder="مثلاً: 123456">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold text-muted small">نوع الشيك (الاتجاه)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-0"><i class="bi bi-arrow-left-right"></i></span>
                                    <select name="check_direction" class="form-select border-0 bg-light" required>
                                        <option value="IN">وارد (من عميل)</option>
                                        <option value="OUT">صادر (لمورد)</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold text-muted small">اسم البنك</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-0"><i class="bi bi-building"></i></span>
                                    <input type="text" name="bank_name" class="form-control border-0 bg-light" placeholder="مثلاً: بنك التضامن">
                                </div>
                            </div>
                        </div>

                        <!-- Financial Info Section -->
                        <div class="row g-4 mb-5">
                            <div class="col-12">
                                <div class="section-title mb-3">
                                    <span class="badge bg-soft-success text-success px-3 py-2 rounded-pill">2. التفاصيل المالية</span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-muted small">مبلغ الشيك</label>
                                <div class="input-group input-group-lg">
                                    <span class="input-group-text bg-success-soft border-0 text-success fw-bold"><i class="bi bi-currency-dollar"></i></span>
                                    <input type="number" name="amount" step="0.01" class="form-control border-0 bg-light fw-bold text-success" required placeholder="0.00">
                                </div>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold text-muted small">تاريخ الإصدار</label>
                                <input type="date" name="issue_date" class="form-control border-0 bg-light" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold text-muted small text-danger">تاريخ الاستحقاق</label>
                                <input type="date" name="due_date" class="form-control border-0 bg-light text-danger fw-bold" required>
                            </div>
                        </div>

                        <!-- Parties Info Section -->
                        <div class="row g-4 mb-5">
                            <div class="col-12">
                                <div class="section-title mb-3">
                                    <span class="badge bg-soft-secondary text-secondary px-3 py-2 rounded-pill">3. الأطراف المعنية</span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-muted small">اسم الساحب (المحرر)</label>
                                <input type="text" name="drawer_name" class="form-control border-0 bg-light" placeholder="الاسم الكامل للساحب">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-muted small">المستفيد</label>
                                <input type="text" name="beneficiary" class="form-control border-0 bg-light" placeholder="اسم المستفيد من الشيك">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-muted small">الربط مع عميل (اختياري)</label>
                                <select name="customer_id" class="form-select border-0 bg-light select2">
                                    <option value="">-- اختر العميل --</option>
                                    {% for c in customers %}
                                    <option value="{{ c.customer_id }}">{{ c.name_ar }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-muted small">الربط مع مورد (اختياري)</label>
                                <select name="supplier_id" class="form-select border-0 bg-light select2">
                                    <option value="">-- اختر المورد --</option>
                                    {% for s in suppliers %}
                                    <option value="{{ s.supplier_id }}">{{ s.name_ar }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <!-- Notes Section -->
                        <div class="row g-4 mb-4">
                            <div class="col-12">
                                <label class="form-label fw-bold text-muted small">ملاحظات إضافية</label>
                                <textarea name="notes" class="form-control border-0 bg-light" rows="3" placeholder="أي تفاصيل أخرى متعلقة بالشيك..."></textarea>
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="d-flex justify-content-end gap-3 pt-4 border-top">
                            <button type="reset" class="btn btn-light rounded-3 px-4 shadow-sm fw-bold">إلغاء</button>
                            <button type="submit" class="btn btn-primary rounded-3 px-5 shadow-sm fw-bold transition-all hover-lift">
                                <i class="bi bi-check-circle-fill me-2"></i>حفظ الشيك
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    :root {
        --primary-soft: rgba(37, 99, 235, 0.1);
        --success-soft: rgba(22, 163, 74, 0.1);
        --secondary-soft: rgba(100, 116, 139, 0.1);
    }
    .bg-soft-primary { background-color: var(--primary-soft); }
    .bg-soft-success { background-color: var(--success-soft); }
    .bg-soft-secondary { background-color: var(--secondary-soft); }
    .bg-success-soft { background-color: rgba(22, 163, 74, 0.05); }

    .hover-lift:hover { transform: translateY(-3px); }
    .transition-all { transition: all 0.3s ease; }

    .form-control:focus, .form-select:focus {
        background-color: #fff !important;
        box-shadow: 0 0 0 0.25rem var(--primary-soft);
        border: none;
    }

    [data-theme='dark'] .card { background-color: #1e293b; color: #fff; }
    [data-theme='dark'] .bg-light { background-color: #0f172a !important; color: #cbd5e1; }
    [data-theme='dark'] .form-control, [data-theme='dark'] .form-select { color: #fff; }
</style>
{% endblock %}
