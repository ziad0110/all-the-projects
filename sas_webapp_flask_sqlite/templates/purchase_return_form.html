{% extends "base.html" %}
{% block content %}
<div class="card p-4">
  <form method="post">
    <div class="row g-3 mb-3">
      <div class="col-md-4"><label class="form-label">فاتورة الشراء</label>
        <select name="original_invoice_id" id="invoiceSelect" class="form-select" required>
          <option value="">-- اختر الفاتورة --</option>
          {% for inv in invoices %}<option value="{{ inv.invoice_id }}">{{ inv.invoice_number }} - {{ inv.supplier_name }} ({{ inv.total|currency }})</option>{% endfor %}
        </select>
      </div>
      <div class="col-md-4"><label class="form-label">تاريخ المرتجع</label><input type="date" name="return_date" class="form-control" required></div>
      <div class="col-md-4"><label class="form-label">السبب</label><input type="text" name="reason" class="form-control"></div>
    </div>
    <div id="linesContainer"></div>
    <button type="submit" class="btn btn-primary mt-3"><i class="bi bi-check-lg me-1"></i>حفظ المرتجع</button>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script id="data-invoiceLines" type="application/json">{{ invoice_lines|tojson }}</script>
<script>
const invoiceLines = JSON.parse(document.getElementById('data-invoiceLines').textContent);
document.getElementById('invoiceSelect').addEventListener('change', function(){
  const c = document.getElementById('linesContainer');
  c.innerHTML = '';
  const lines = invoiceLines[this.value] || [];
  lines.forEach(l => {
    c.innerHTML += `<div class="line-card mb-2"><div class="row g-2 align-items-center">
      <input type="hidden" name="original_line_id[]" value="${l.line_id}">
      <div class="col-md-4"><strong>${l.item_name}</strong></div>
      <div class="col-md-2">الكمية: ${l.quantity}</div>
      <div class="col-md-2">التكلفة: ${l.unit_cost}</div>
      <div class="col-md-2"><input type="number" name="quantity[]" step="0.01" max="${l.quantity}" class="form-control" placeholder="كمية المرتجع"></div>
    </div></div>`;
  });
});
</script>
{% endblock %}
