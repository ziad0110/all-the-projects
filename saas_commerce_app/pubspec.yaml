name: saas_commerce_app
description: منصة تجارية قابلة للتخصيص - SaaS Commerce Platform
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # UI & Styling
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  
  # Navigation
  go_router: ^12.1.3
  
  # Persistence
  shared_preferences: ^2.2.2
  
  # Utilities
  intl: ^0.19.0
  logger: ^2.0.2
  
  # Color Picker for Settings
  flutter_colorpicker: ^1.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/config/
    - google_fonts/

